<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 Gerador de Script ADM | Provedor de Internet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
    <style>
        :root {
            --primary-50: #ecfdf5;
            --primary-100: #d1fae5;
            --primary-200: #a7f3d0;
            --primary-300: #6ee7b7;
            --primary-400: #34d399;
            --primary-500: #10b981;
            --primary-600: #059669;
            --primary-700: #047857;
            --primary-800: #065f46;
            --primary-900: #064e3b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(20px);
            --transition-fast: 0.15s ease;
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(51, 65, 85, 0.5);
            --gray-50: #0f172a;
            --gray-100: #1e293b;
            --gray-200: #334155;
            --gray-300: #475569;
            --gray-400: #64748b;
            --gray-500: #94a3b8;
            --gray-600: #cbd5e1;
            --gray-700: #e2e8f0;
            --gray-800: #f1f5f9;
            --gray-900: #f8fafc;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #d1fae5 100%);
            background-attachment: fixed;
            color: #1f2937;
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; right: -20%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            border-radius: 50%; z-index: -1;
        }

        [data-theme="dark"] body::before {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        }

        .app-container { max-width: 1440px; margin: 0 auto; padding: 24px; }

        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }

        [data-theme="dark"] .header {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(51, 65, 85, 0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .logo-container {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #10b981, #047857);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .logo-container svg { width: 36px; height: 36px; color: white; }

        .header-content h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #047857, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        [data-theme="dark"] .header-content h1 {
            background: linear-gradient(135deg, #6ee7b7, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-content p { color: #4b5563; font-size: 0.95rem; }
        [data-theme="dark"] .header-content p { color: #94a3b8; }

        .theme-toggle {
            padding: 10px 16px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #374151;
            transition: 0.15s ease;
        }

        .theme-toggle:hover {
            border-color: #10b981;
            background: #ecfdf5;
        }

        [data-theme="dark"] .theme-toggle {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        [data-theme="dark"] .theme-toggle:hover {
            border-color: #34d399;
            background: #064e3b;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] .card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(51, 65, 85, 0.5);
        }

        .card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .card-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 2px solid #d1fae5;
        }

        [data-theme="dark"] .card-header {
            border-bottom-color: #064e3b;
        }

        .card-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        [data-theme="dark"] .card-icon {
            background: linear-gradient(135deg, #065f46, #047857);
        }

        .card-icon svg { width: 22px; height: 22px; color: #047857; }
        [data-theme="dark"] .card-icon svg { color: #6ee7b7; }

        .card-title { font-size: 1.2rem; color: #111827; font-weight: 700; }
        [data-theme="dark"] .card-title { color: #f1f5f9; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-label {
            font-size: 0.85rem; font-weight: 600; color: #374151;
            display: flex; align-items: center; gap: 6px;
        }

        [data-theme="dark"] .form-label { color: #cbd5e1; }

        .form-label .required { color: #ef4444; font-weight: 700; }

        .form-input, .form-select {
            width: 100%; padding: 12px 16px;
            background: white; border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: var(--font-sans); font-size: 0.95rem;
            color: #1f2937; transition: 0.15s ease; outline: none;
        }

        [data-theme="dark"] .form-input, [data-theme="dark"] .form-select {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        [data-theme="dark"] .form-input::placeholder, [data-theme="dark"] .form-select::placeholder {
            color: #64748b;
        }

        .form-input:focus, .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .form-input.error { border-color: #ef4444; background: #fef2f2; }
        [data-theme="dark"] .form-input.error { background: #7f1d1d; color: #fecaca; }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px; margin-top: 8px;
        }

        .checkbox-item {
            display: flex; align-items: center;
            padding: 10px 14px;
            background: white; border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer; transition: 0.15s ease;
            font-size: 0.9rem;
            color: #1f2937;
        }

        [data-theme="dark"] .checkbox-item {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        .checkbox-item:hover { border-color: #6ee7b7; background: #ecfdf5; }
        .checkbox-item.selected { border-color: #10b981; background: #ecfdf5; }
        [data-theme="dark"] .checkbox-item.selected {
            background: #064e3b;
            border-color: #10b981;
        }
        .checkbox-item input { display: none; }

        .checkbox-custom {
            width: 20px; height: 20px;
            background: white; border: 2px solid #d1d5db;
            border-radius: 4px; margin-right: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.15s ease;
        }

        [data-theme="dark"] .checkbox-custom {
            background: #334155;
            border-color: #475569;
        }

        .checkbox-item.selected .checkbox-custom {
            background: #10b981; border-color: #10b981;
        }

        .checkbox-custom svg { width: 14px; height: 14px; color: white; display: none; }
        .checkbox-item.selected .checkbox-custom svg { display: block; }

        .planos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .plano-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        [data-theme="dark"] .plano-card {
            background: #1e293b;
            border-color: #334155;
        }

        .plano-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 4px; background: #10b981;
            transform: scaleX(0); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .plano-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #6ee7b7;
        }

        .plano-card.selected {
            border-color: #10b981;
            background: linear-gradient(135deg, #ecfdf5, white);
            transform: translateY(-4px) scale(1.02);
        }

        [data-theme="dark"] .plano-card.selected {
            background: linear-gradient(135deg, #064e3b, #1e293b);
        }

        .plano-card.selected::before { transform: scaleX(1); }

        .plano-nome {
            font-size: 0.85rem; font-weight: 600;
            color: #4b5563; text-transform: uppercase;
            margin-bottom: 4px;
        }

        [data-theme="dark"] .plano-nome { color: #94a3b8; }

        .plano-velocidade {
            font-size: 2rem; font-weight: 800;
            color: #111827; line-height: 1; margin-bottom: 4px;
        }

        [data-theme="dark"] .plano-velocidade { color: #f1f5f9; }

        .plano-velocidade span { font-size: 1rem; font-weight: 600; color: #4b5563; }
        [data-theme="dark"] .plano-velocidade span { color: #94a3b8; }

        .plano-valor { font-size: 1.4rem; font-weight: 700; color: #047857; margin: 12px 0; }
        [data-theme="dark"] .plano-valor { color: #34d399; }

        .plano-valor small { font-size: 0.8rem; font-weight: 500; color: #6b7280; }
        [data-theme="dark"] .plano-valor small { color: #94a3b8; }

        .plano-select-btn {
            width: 100%; padding: 10px;
            background: #10b981; color: white;
            border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer;
            transition: 0.15s ease;
        }

        .plano-select-btn:hover { background: #059669; }

        .promo-section {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #ecfdf5, white);
            border-radius: 16px;
            border: 2px dashed #6ee7b7;
            display: none;
        }

        [data-theme="dark"] .promo-section {
            background: linear-gradient(135deg, #064e3b, #1e293b);
            border-color: #047857;
        }

        .promo-section.show { display: block; }

        .promo-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }

        .promo-title {
            font-weight: 700; color: #047857;
            display: flex; align-items: center; gap: 8px;
        }

        [data-theme="dark"] .promo-title { color: #34d399; }

        .checkbox-custom-promo {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; user-select: none;
            color: #374151;
        }

        [data-theme="dark"] .checkbox-custom-promo { color: #cbd5e1; }

        .checkbox-custom-promo input { display: none; }

        .checkmark-promo {
            width: 22px; height: 22px;
            background: white; border: 2px solid #d1d5db;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s ease;
        }

        [data-theme="dark"] .checkmark-promo {
            background: #334155;
            border-color: #475569;
        }

        .checkbox-custom-promo input:checked + .checkmark-promo {
            background: #10b981; border-color: #10b981;
        }

        .checkmark-promo svg { display: none; width: 14px; height: 14px; color: white; }
        .checkbox-custom-promo input:checked + .checkmark-promo svg { display: block; }

        .promo-original {
            font-size: 1rem; color: #4b5563;
            text-decoration: line-through; margin-bottom: 12px;
        }

        [data-theme="dark"] .promo-original { color: #94a3b8; }

        .promo-input-group { display: none; }
        .promo-input-group.show { display: block; }

        .promo-input-group label {
            font-size: 0.85rem; font-weight: 600;
            color: #374151; margin-bottom: 6px; display: block;
        }

        [data-theme="dark"] .promo-input-group label { color: #cbd5e1; }

        .servicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .servico-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] .servico-card {
            background: #1e293b;
            border-color: #334155;
        }

        .servico-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .servico-card.selected { border-color: #10b981; }

        .servico-content { padding: 16px; }

        .servico-nome { font-size: 1.1rem; font-weight: 700; color: #111827; margin-bottom: 6px; }
        [data-theme="dark"] .servico-nome { color: #f1f5f9; }

        .servico-desc { font-size: 0.85rem; color: #4b5563; margin-bottom: 12px; }
        [data-theme="dark"] .servico-desc { color: #94a3b8; }

        .servico-controles { margin: 12px 0; }
        .servico-controles label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: #374151; margin-bottom: 6px;
        }

        [data-theme="dark"] .servico-controles label { color: #cbd5e1; }

        .quantidade-input { display: flex; align-items: center; gap: 10px; }

        .quantidade-btn {
            width: 36px; height: 36px;
            background: #f3f4f6; border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer; font-size: 1.2rem; font-weight: 700;
            color: #374151; transition: 0.15s ease;
        }

        [data-theme="dark"] .quantidade-btn {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        .quantidade-btn:hover {
            background: #10b981; color: white; border-color: #10b981;
        }

        .quantidade-value {
            flex: 1; text-align: center; font-size: 1.2rem; font-weight: 700;
            color: #1f2937; padding: 8px;
            background: #f9fafb; border-radius: 12px;
        }

        [data-theme="dark"] .quantidade-value {
            background: #334155;
            color: #e2e8f0;
        }

        .dias-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px; margin-top: 10px;
        }

        .dias-opcao {
            padding: 10px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer; text-align: center;
            transition: 0.15s ease;
        }

        [data-theme="dark"] .dias-opcao {
            background: #334155;
            border-color: #475569;
        }

        .dias-opcao:hover { border-color: #6ee7b7; }
        .dias-opcao.selected { border-color: #10b981; background: #ecfdf5; }
        [data-theme="dark"] .dias-opcao.selected { background: #064e3b; }

        .dias-opcao-label { font-size: 0.85rem; font-weight: 600; color: #374151; }
        [data-theme="dark"] .dias-opcao-label { color: #cbd5e1; }

        .dias-opcao-valor { font-size: 0.95rem; font-weight: 700; color: #047857; margin-top: 2px; }
        [data-theme="dark"] .dias-opcao-valor { color: #34d399; }

        .servico-valor-total {
            font-size: 1.3rem; font-weight: 800;
            color: #047857; margin-top: 12px;
        }

        [data-theme="dark"] .servico-valor-total { color: #34d399; }

        .servico-add-btn {
            width: 100%; padding: 10px; margin-top: 12px;
            background: #f3f4f6; color: #374151;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-weight: 600; cursor: pointer;
            transition: 0.15s ease;
        }

        [data-theme="dark"] .servico-add-btn {
            background: #334155;
            color: #e2e8f0;
            border-color: #475569;
        }

        .servico-add-btn:hover {
            background: #10b981; color: white; border-color: #10b981;
        }

        .servico-card.selected .servico-add-btn {
            background: #10b981; color: white;
        }

        .adesao-opcoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 16px;
        }

        .adesao-opcao {
            padding: 16px; background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer; text-align: center;
            transition: 0.15s ease;
            color: #1f2937;
        }

        [data-theme="dark"] .adesao-opcao {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        .adesao-opcao:hover { border-color: #6ee7b7; }
        .adesao-opcao.selected { border-color: #10b981; background: #ecfdf5; }
        [data-theme="dark"] .adesao-opcao.selected { background: #064e3b; }

        .adesao-detalhes {
            display: none; padding: 16px;
            background: #f9fafb;
            border-radius: 12px; margin-top: 12px;
        }

        [data-theme="dark"] .adesao-detalhes {
            background: #334155;
        }

        .adesao-detalhes.show { display: block; }

        /* AUT SUPERVISÃO */
        .aut-supervisao-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        [data-theme="dark"] .aut-supervisao-container {
            background: #334155;
            border-color: #475569;
        }

        .aut-supervisao-container:hover {
            border-color: #6ee7b7;
        }

        .aut-supervisao-container.active {
            border-color: #10b981;
            background: #ecfdf5;
        }

        [data-theme="dark"] .aut-supervisao-container.active {
            background: #064e3b;
            border-color: #10b981;
        }

        .aut-checkbox {
            width: 24px; height: 24px;
            background: white; border: 2px solid #d1d5db;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.15s ease;
        }

        [data-theme="dark"] .aut-checkbox {
            background: #1e293b;
            border-color: #475569;
        }

        .aut-supervisao-container.active .aut-checkbox {
            background: #10b981; border-color: #10b981;
        }

        .aut-checkbox svg { width: 16px; height: 16px; color: white; display: none; }
        .aut-supervisao-container.active .aut-checkbox svg { display: block; }

        .aut-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.95rem;
        }

        [data-theme="dark"] .aut-label { color: #e2e8f0; }

        .resumo-card {
            position: sticky; top: 24px;
            background: linear-gradient(135deg, #059669, #064e3b);
            color: white; border-radius: 24px;
            padding: 28px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .resumo-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .resumo-header-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .resumo-header-icon svg { width: 22px; height: 22px; color: white; }
        .resumo-title { font-size: 1.2rem; font-weight: 700; }

        .resumo-item {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .resumo-item-value-promo {
            color: #fbbf24;
            text-decoration: line-through;
            font-size: 0.85rem;
        }

        .resumo-total {
            display: flex; justify-content: space-between;
            padding: 20px 0 0; margin-top: 12px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
        }

        .resumo-total-label { font-size: 1.1rem; font-weight: 700; }
        .resumo-total-value { font-size: 1.8rem; font-weight: 800; }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-top: 24px;
        }

        .btn {
            padding: 14px 20px; border: none;
            border-radius: 12px;
            font-family: var(--font-sans); font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: 0.15s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn svg { width: 18px; height: 18px; }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #047857);
            color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .btn-secondary {
            background: white; color: #374151;
            border: 2px solid #e5e7eb;
        }

        [data-theme="dark"] .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border-color: #334155;
        }

        .btn-secondary:hover { border-color: #10b981; color: #047857; }
        [data-theme="dark"] .btn-secondary:hover { color: #34d399; }

        .btn-danger {
            background: white; color: #ef4444;
            border: 2px solid #ef4444;
        }

        [data-theme="dark"] .btn-danger {
            background: #1e293b;
            border-color: #ef4444;
        }

        .btn-danger:hover { background: #ef4444; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .script-output {
            margin-top: 20px; padding: 20px;
            background: #111827; border-radius: 16px;
            color: #f3f4f6;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem; line-height: 1.8;
            white-space: pre-wrap; display: none;
            position: relative;
        }

        [data-theme="dark"] .script-output {
            background: #020617;
            border: 1px solid #334155;
        }

        .script-output.show { display: block; }

        .script-output::before {
            content: '🔄 ATUALIZAÇÃO EM TEMPO REAL';
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.7rem;
            color: #34d399;
            font-family: var(--font-sans);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .toast-container {
            position: fixed; top: 24px; right: 24px;
            z-index: 1000; display: flex; flex-direction: column; gap: 12px;
        }

        .toast {
            background: white; border-radius: 12px;
            padding: 16px 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 12px;
            min-width: 300px; animation: slideIn 0.4s ease;
            border-left: 4px solid #10b981;
        }

        [data-theme="dark"] .toast {
            background: #1e293b;
            border: 1px solid #334155;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }

        .toast-message { flex: 1; font-size: 0.9rem; color: #1f2937; }
        [data-theme="dark"] .toast-message { color: #e2e8f0; }

        .toast-close { background: none; border: none; cursor: pointer; color: #9ca3af; }

        @media (max-width: 768px) {
            .app-container { padding: 12px; }
            .header { flex-direction: column; text-align: center; }
            .header-left { flex-direction: column; }
            .planos-grid, .servicos-grid { grid-template-columns: 1fr; }
            .checkbox-group { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

        ];

        const state = {

            adesao: { tipo: null, vencimento: null, valor: null },

            scriptGerado: null,
            autSupervisao: false
        };

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Tema Escuro';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Tema Claro';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').textContent = '☀️';
            document.getElementById('themeText').textContent = 'Tema Claro';
        }

        function toggleAut() {
            state.autSupervisao = !state.autSupervisao;
            const container = document.getElementById('autContainer');
            const obsGroup = document.getElementById('autObsGroup');
            
            if (state.autSupervisao) {
                container.classList.add('active');
                obsGroup.style.display = 'block';
            } else {
                container.classList.remove('active');
                obsGroup.style.display = 'none';
                document.getElementById('autObs').value = '';
            }
            gerarScript();
        }

        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        };

        const formatarData = (dataStr) => {
            if (!dataStr) return '';
            const [ano, mes, dia] = dataStr.split('-');
            return `${dia}/${mes}/${ano}`;
        };

        const aplicarMascaraCPF = (valor) => {
            return valor.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})/, '$1-$2')
                .replace(/(-\d{2})\d+?$/, '$1');
        };

        const aplicarMascaraTelefone = (valor) => {
            return valor.replace(/\D/g, '').replace(/(\d{2})(\d)/, '($1) $2')
                .replace(/(\d{5})(\d)/, '$1-$2').replace(/(-\d{4})\d+?$/, '$1');
        };

        const aplicarMascaraMoeda = (valor) => {
            const numeros = valor.replace(/\D/g, '');
            const centavos = numeros.slice(-2).padStart(2, '0');
            const reais = numeros.slice(0, -2) || '0';
            const reaisFormatado = parseInt(reais).toLocaleString('pt-BR');
            return `R$ ${reaisFormatado},${centavos}`;
        };

        const parseMoeda = (valorStr) => {
            if (!valorStr) return 0;
            const numeros = valorStr.replace(/\D/g, '');
            return parseInt(numeros) / 100;
        };

        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-message">${message}</div>
                <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const getValorPlanoAtual = () => {
            if (!state.planoSelecionado) return 0;
            return state.valorPromocional || state.planoSelecionado.valor;
        };

        const calcularTotalServicos = () => {
            let total = 0;
            state.servicosSelecionados.forEach(info => { total += info.valor; });
            return total;
        };

        const calcularTotalGeral = () => {
            let total = getValorPlanoAtual();
            total += calcularTotalServicos();
            if (state.adesao.tipo === 'paga' && state.adesao.valor) {
                total += parseFloat(state.adesao.valor);
            }
            return total;
        };

        const montarStringPlano = () => {
            if (!state.planoSelecionado) return '';

            const partes = [];
            const velocidade = state.planoSelecionado.velocidade.replace('MB', ' megas');
            partes.push(velocidade);

            if (state.servicosSelecionados.has('gamer')) {
                partes.push('plano gamer');
            }

            if (state.servicosSelecionados.has('mesh')) {
                partes.push('plano mesh');
            }

            const camerasInfo = state.servicosSelecionados.get('linkvideo');
            if (camerasInfo && camerasInfo.quantidade > 0) {
                const dias = camerasInfo.dias;
                const qtd = camerasInfo.quantidade;
                const textoDias = dias === 7 ? '7 dias' : '15 dias';
                const textoQtd = qtd === 1 ? '1 câmera' : `${qtd} câmeras`;
                partes.push(`${textoQtd} de ${textoDias}`);
            }

            const valorFinal = getValorPlanoAtual() + calcularTotalServicos();
            const valorFormatado = formatarMoeda(valorFinal);

            return `${partes.join(' + ')} = ${valorFormatado}`;
        };

        const gerarScript = () => {
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const dataAgendamento = document.getElementById('dataAgendamento').value;
            const local = document.getElementById('local').value;
            const disponibilidade = document.getElementById('disponibilidade').value;
            const telefone = document.getElementById('telefone').value.trim();
            const telefone2 = document.getElementById('telefone2').value.trim();
            const complemento = document.getElementById('complemento').value.trim();
            const localizacao = document.getElementById('localizacao').value.trim();
            const obsAdicionais = document.getElementById('obsAdicionais').value.trim();
            const autObs = document.getElementById('autObs').value.trim();

            const utilizacaoStr = state.utilizacoes.length > 0 ? state.utilizacoes.join(', ') : 'Não informado';
            const planoStr = montarStringPlano() || 'Não selecionado';

            let adesaoStr = 'Não informado';
            if (state.adesao.tipo === 'gratuita') {
                adesaoStr = 'GRATIS';
            } else if (state.adesao.tipo === 'paga' && state.adesao.valor && state.adesao.vencimento) {
                adesaoStr = `VENC ${state.adesao.vencimento} - ${formatarMoeda(parseFloat(state.adesao.valor))}`;
            }

            const autStr = state.autSupervisao ? `SIM${autObs ? ' - ' + autObs : ''}` : 'NÃO';

            const script = `NOME: ${nome || 'Não informado'}
CPF: ${cpf || 'Não informado'}
SLA: ${formatarData(dataAgendamento) || 'Não informado'}
DISPONIBILIDADE: ${disponibilidade ? `${disponibilidade} (${local || 'Não informado'})` : 'Não informado'}
UTILIZAÇÃO: ${utilizacaoStr}
PLANO: ${planoStr}
TEL: ${telefone || 'Não informado'}
TEL2: ${telefone2 || 'Não informado'}
ADESÃO + FORMA DE PAGAMENTO: ${adesaoStr}
COMPLEMENTO/ PONTO DE REF: ${complemento || 'Não informado'}
LOCALIZAÇÃO: ${localizacao || 'Não informado'}
OBS ADICIONAIS: ${obsAdicionais || 'Não informado'}
AUT SUPERVISÃO: ${autStr}`;

            state.scriptGerado = script;
            const output = document.getElementById('scriptOutput');
            output.textContent = script;
            output.classList.add('show');

            const temConteudo = telefone || state.planoSelecionado;
            document.getElementById('btnCopiar').disabled = !temConteudo;
            document.getElementById('btnBaixar').disabled = !temConteudo;
        };

        const renderizarPlanos = () => {
            const grid = document.getElementById('planosGrid');
            grid.innerHTML = PLANOS.map(plano => `
                <div class="plano-card ${state.planoSelecionado?.id === plano.id ? 'selected' : ''}"
                     data-plano-id="${plano.id}">
                    <div class="plano-nome">${plano.nome}</div>
                    <div class="plano-velocidade">${plano.velocidade}</div>
                    <div class="plano-valor">${formatarMoeda(plano.valor)}<small>/mês</small></div>
                    <button class="plano-select-btn">
                        ${state.planoSelecionado?.id === plano.id ? '✓ Selecionado' : 'Selecionar'}
                    </button>
                </div>
            `).join('');

            document.querySelectorAll('.plano-card').forEach(card => {
                card.addEventListener('click', () => {
                    const plano = PLANOS.find(p => p.id === card.dataset.planoId);
                    state.planoSelecionado = plano;
                    state.valorPromocional = null;
                    document.getElementById('promoCheckbox').checked = false;
                    document.getElementById('promoInputGroup').classList.remove('show');
                    document.getElementById('promoSection').classList.add('show');
                    document.getElementById('promoOriginal').textContent = `Valor original: ${formatarMoeda(plano.valor)}`;
                    document.getElementById('promoValor').value = '';
                    renderizarPlanos();
                    atualizarResumo();
                    gerarScript();
                    showToast(`Plano ${plano.velocidade} selecionado`);
                });
            });
        };

        const renderizarServicos = () => {
            const grid = document.getElementById('servicosGrid');
            grid.innerHTML = SERVICOS.map(servico => {
                const info = state.servicosSelecionados.get(servico.id);
                const isSelected = !!info;

                if (servico.tipo === 'cameras') {
                    const quantidade = info?.quantidade || 0;
                    const diasSelecionados = info?.dias || 7;
                    const opcaoDias = servico.opcoesDias.find(o => o.dias === diasSelecionados);
                    const valorUnitario = opcaoDias ? opcaoDias.valor : servico.opcoesDias[0].valor;
                    const valorTotal = quantidade * valorUnitario;

                    return `
                        <div class="servico-card ${isSelected && quantidade > 0 ? 'selected' : ''}">
                            <div class="servico-content">
                                <div class="servico-nome">${servico.nome}</div>
                                <div class="servico-desc">${servico.descricao}</div>
                                
                                <div class="servico-controles">
                                    <label>Quantidade de Câmeras:</label>
                                    <div class="quantidade-input">
                                        <button class="quantidade-btn" onclick="alterarQuantidadeCameras(-1)">−</button>
                                        <div class="quantidade-value">${quantidade}</div>
                                        <button class="quantidade-btn" onclick="alterarQuantidadeCameras(1)">+</button>
                                    </div>
                                </div>

                                <div class="servico-controles">
                                    <label>Tempo de Armazenamento:</label>
                                    <div class="dias-selector">
                                        ${servico.opcoesDias.map(op => `
                                            <div class="dias-opcao ${diasSelecionados === op.dias ? 'selected' : ''}"
                                                 onclick="selecionarDias(${op.dias})">
                                                <div class="dias-opcao-label">${op.label}</div>
                                                <div class="dias-opcao-valor">${formatarMoeda(op.valor)}/un</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <div class="servico-valor-total">
                                    ${quantidade > 0 
                                        ? `${quantidade}x ${formatarMoeda(valorUnitario)} = ${formatarMoeda(valorTotal)}/mês` 
                                        : formatarMoeda(valorUnitario) + '/un'}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="servico-card ${isSelected ? 'selected' : ''}">
                            <div class="servico-content">
                                <div class="servico-nome">${servico.nome}</div>
                                <div class="servico-desc">${servico.descricao}</div>
                                <div class="servico-valor-total">${formatarMoeda(servico.valor)}/mês</div>
                                <button class="servico-add-btn" onclick="toggleServico('${servico.id}')">
                                    ${isSelected ? '✓ Remover' : '+ Adicionar'}
                                </button>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        };

        window.alterarQuantidadeCameras = (delta) => {
            const servico = SERVICOS.find(s => s.id === 'linkvideo');
            const current = state.servicosSelecionados.get('linkvideo');
            let novaQuantidade = (current?.quantidade || 0) + delta;
            
            if (novaQuantidade < 0) novaQuantidade = 0;
            
            const diasSelecionados = current?.dias || 7;
            const opcaoDias = servico.opcoesDias.find(o => o.dias === diasSelecionados);
            const valorUnitario = opcaoDias ? opcaoDias.valor : servico.opcoesDias[0].valor;

            if (novaQuantidade > 0) {
                state.servicosSelecionados.set('linkvideo', {
                    quantidade: novaQuantidade,
                    dias: diasSelecionados,
                    valorUnitario: valorUnitario,
                    valor: novaQuantidade * valorUnitario
                });
            } else {
                state.servicosSelecionados.delete('linkvideo');
            }
            
            renderizarServicos();
            atualizarResumo();
            gerarScript();
        };

        window.selecionarDias = (dias) => {
            const servico = SERVICOS.find(s => s.id === 'linkvideo');
            const current = state.servicosSelecionados.get('linkvideo');
            const quantidade = current?.quantidade || 0;
            const opcaoDias = servico.opcoesDias.find(o => o.dias === dias);
            const valorUnitario = opcaoDias ? opcaoDias.valor : servico.opcoesDias[0].valor;

            if (quantidade > 0) {
                state.servicosSelecionados.set('linkvideo', {
                    quantidade: quantidade,
                    dias: dias,
                    valorUnitario: valorUnitario,
                    valor: quantidade * valorUnitario
                });
            } else {
                state.servicosSelecionados.set('linkvideo', {
                    quantidade: 0,
                    dias: dias,
                    valorUnitario: valorUnitario,
                    valor: 0
                });
            }

            renderizarServicos();
            atualizarResumo();
            gerarScript();
        };

        window.toggleServico = (servicoId) => {
            if (state.servicosSelecionados.has(servicoId)) {
                state.servicosSelecionados.delete(servicoId);
                showToast('Serviço removido', 'warning');
            } else {
                const servico = SERVICOS.find(s => s.id === servicoId);
                state.servicosSelecionados.set(servicoId, {
                    quantidade: 1,
                    valor: servico.valor
                });
                showToast('Serviço adicionado!');
            }
            renderizarServicos();
            atualizarResumo();
            gerarScript();
        };

        const atualizarResumo = () => {
            const content = document.getElementById('resumoContent');
            const totalEl = document.getElementById('resumoTotal');
            let html = '';

            if (state.planoSelecionado) {
                const valorAtual = getValorPlanoAtual();
                html += `
                    <div class="resumo-item">
                        <span>Plano</span>
                        <span>${state.planoSelecionado.velocidade}</span>
                    </div>
                `;
                if (state.valorPromocional) {
                    html += `
                        <div class="resumo-item">
                            <span>Valor Original</span>
                            <span class="resumo-item-value-promo">${formatarMoeda(state.planoSelecionado.valor)}</span>
                        </div>
                        <div class="resumo-item">
                            <span>Valor Promocional</span>
                            <span style="color: #fbbf24; font-weight: 700;">${formatarMoeda(valorAtual)}</span>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="resumo-item">
                            <span>Valor</span>
                            <span>${formatarMoeda(valorAtual)}</span>
                        </div>
                    `;
                }
            }

            state.servicosSelecionados.forEach((info, id) => {
                const servico = SERVICOS.find(s => s.id === id);
                if (info.valor > 0) {
                    html += `
                        <div class="resumo-item">
                            <span>${servico.nome}</span>
                            <span>${formatarMoeda(info.valor)}</span>
                        </div>
                    `;
                }
            });

            if (state.adesao.tipo === 'paga' && state.adesao.valor) {
                html += `
                    <div class="resumo-item">
                        <span>Adesão</span>
                        <span>${formatarMoeda(parseFloat(state.adesao.valor))}</span>
                    </div>
                `;
            } else if (state.adesao.tipo === 'gratuita') {
                html += `
                    <div class="resumo-item">
                        <span>Adesão</span>
                        <span style="color: #fbbf24;">Gratuita</span>
                    </div>
                `;
            }

            if (!html) {
                content.innerHTML = '<div style="text-align: center; padding: 20px; opacity: 0.8;">Preencha os dados</div>';
                totalEl.style.display = 'none';
            } else {
                content.innerHTML = html;
                totalEl.style.display = 'flex';
                document.getElementById('resumoTotalValue').textContent = formatarMoeda(calcularTotalGeral());
            }
        };

        const inicializar = () => {
            document.getElementById('cpf').addEventListener('input', (e) => {
                e.target.value = aplicarMascaraCPF(e.target.value);
                gerarScript();
            });

            document.getElementById('telefone').addEventListener('input', (e) => {
                e.target.value = aplicarMascaraTelefone(e.target.value);
                gerarScript();
            });

            document.getElementById('telefone2').addEventListener('input', (e) => {
                e.target.value = aplicarMascaraTelefone(e.target.value);
                gerarScript();
            });

            document.getElementById('promoValor').addEventListener('input', (e) => {
                e.target.value = aplicarMascaraMoeda(e.target.value);
                const valor = parseMoeda(e.target.value);
                if (valor > 0) {
                    state.valorPromocional = valor;
                } else {
                    state.valorPromocional = null;
                }
                atualizarResumo();
                gerarScript();
            });

            document.getElementById('promoCheckbox').addEventListener('change', (e) => {
                const inputGroup = document.getElementById('promoInputGroup');
                if (e.target.checked) {
                    inputGroup.classList.add('show');
                } else {
                    inputGroup.classList.remove('show');
                    state.valorPromocional = null;
                    document.getElementById('promoValor').value = '';
                    atualizarResumo();
                    gerarScript();
                }
            });

            document.querySelectorAll('.checkbox-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const checkbox = item.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                    item.classList.toggle('selected', checkbox.checked);
                    
                    const value = checkbox.value;
                    if (checkbox.checked) {
                        if (!state.utilizacoes.includes(value)) {
                            state.utilizacoes.push(value);
                        }
                    } else {
                        state.utilizacoes = state.utilizacoes.filter(u => u !== value);
                    }
                    gerarScript();
                });
            });

            document.getElementById('autObs').addEventListener('input', gerarScript);

            const inputsTexto = ['nome', 'dataAgendamento', 'complemento', 'localizacao', 'obsAdicionais'];
            inputsTexto.forEach(id => {
                document.getElementById(id).addEventListener('input', gerarScript);
            });

            const selects = ['local', 'disponibilidade'];
            selects.forEach(id => {
                document.getElementById(id).addEventListener('change', gerarScript);
            });

            const selectVenc = document.getElementById('adesaoVencimento');
            for (let i = 1; i <= 31; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `Dia ${i}`;
                selectVenc.appendChild(opt);
            }

            document.querySelectorAll('.adesao-opcao').forEach(opcao => {
                opcao.addEventListener('click', () => {
                    document.querySelectorAll('.adesao-opcao').forEach(o => o.classList.remove('selected'));
                    opcao.classList.add('selected');
                    
                    const tipo = opcao.dataset.adesao;
                    state.adesao.tipo = tipo;
                    
                    const detalhes = document.getElementById('adesaoDetalhes');
                    if (tipo === 'paga') {
                        detalhes.classList.add('show');
                    } else {
                        detalhes.classList.remove('show');
                        state.adesao.vencimento = null;
                        state.adesao.valor = null;
                    }
                    atualizarResumo();
                    gerarScript();
                });
            });

            document.getElementById('adesaoVencimento').addEventListener('change', (e) => {
                state.adesao.vencimento = e.target.value;
                atualizarResumo();
                gerarScript();
            });

            document.getElementById('adesaoValor').addEventListener('change', (e) => {
                state.adesao.valor = e.target.value;
                atualizarResumo();
                gerarScript();
            });

            document.getElementById('btnCopiar').addEventListener('click', async () => {
                if (!state.scriptGerado) return;
                try {
                    await navigator.clipboard.writeText(state.scriptGerado);
                    showToast('Script copiado!');
                } catch (err) {
                    const textarea = document.createElement('textarea');
                    textarea.value = state.scriptGerado;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('Script copiado!');
                }
            });

            document.getElementById('btnBaixar').addEventListener('click', () => {
                if (!state.scriptGerado) return;
                const blob = new Blob([state.scriptGerado], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const nomeCliente = document.getElementById('nome').value.trim()
                    .replace(/\s+/g, '_')
                    .replace(/[^a-zA-Z0-9_À-ÿ]/g, '');
                const nomeArquivo = nomeCliente ? `script_${nomeCliente}_${Date.now()}.txt` : `script_${Date.now()}.txt`;
                
                a.href = url;
                a.download = nomeArquivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Arquivo baixado!');
            });

            document.getElementById('btnLimpar').addEventListener('click', () => {
                if (!confirm('Limpar todos os dados?')) return;
                
                document.querySelectorAll('.form-input, .form-textarea').forEach(i => i.value = '');
                document.querySelectorAll('.form-select').forEach(s => s.value = '');
                document.querySelectorAll('.checkbox-item').forEach(c => {
                    c.classList.remove('selected');
                    c.querySelector('input').checked = false;
                });
                
                state.planoSelecionado = null;
                state.servicosSelecionados.clear();
                state.utilizacoes = [];
                state.adesao = { tipo: null, vencimento: null, valor: null };
                state.valorPromocional = null;
                state.scriptGerado = null;
                state.autSupervisao = false;
                
                document.getElementById('autContainer').classList.remove('active');
                document.getElementById('autObsGroup').style.display = 'none';
                document.getElementById('promoSection').classList.remove('show');
                document.getElementById('adesaoDetalhes').classList.remove('show');
                document.querySelectorAll('.adesao-opcao').forEach(o => o.classList.remove('selected'));
                document.getElementById('scriptOutput').classList.remove('show');
                document.getElementById('btnCopiar').disabled = true;
                document.getElementById('btnBaixar').disabled = true;
                
                renderizarPlanos();
                renderizarServicos();
                atualizarResumo();
                
                showToast('Dados limpos!');
            });

            renderizarPlanos();
            renderizarServicos();
            
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataAgendamento').min = hoje;
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inicializar);
        } else {
            inicializar();
        }
    </script>
</body>
</html>
